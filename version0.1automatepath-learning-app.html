/* ============================================================
   AUTH
   Important limitation: this account system stores data only in
   this browser's localStorage (or in-memory if unavailable). It is
   NOT a real backend — there is no server, no real password security
   beyond a client-side hash, and no cross-device access. It exists to
   give a realistic signup/login UX while a real backend isn't wired up.
   ============================================================ */
const USERS_KEY = 'automatepath_users';
const SESSION_KEY = 'automatepath_session';
let CURRENT_USER = null; // { email }
let _memUsers = null;
let _memSession = null;

/* Storage shim: uses window.storage when running as a Claude artifact,
   falls back to localStorage when opened as a standalone HTML file,
   falls back to in-memory (no persistence) if neither is available. */
async function rawGet(key){
  if(window.storage && typeof window.storage.get === 'function'){
    try{ const res = await window.storage.get(key); return res ? res.value : null; }
    catch(e){ return null; }
  }
  try{ if(window.localStorage){ return window.localStorage.getItem(key); } }
  catch(e){ /* localStorage blocked (e.g. private mode, sandboxed iframe) */ }
  return key===USERS_KEY ? _memUsers : (key===SESSION_KEY ? _memSession : null);
}
async function rawSet(key, value){
  if(window.storage && typeof window.storage.set === 'function'){
    try{ await window.storage.set(key, value); return; }
    catch(e){ /* fall through */ }
  }
  try{ if(window.localStorage){ window.localStorage.setItem(key, value); return; } }
  catch(e){ /* localStorage blocked */ }
  if(key===USERS_KEY) _memUsers = value; else if(key===SESSION_KEY) _memSession = value;
}
async function rawRemove(key){
  if(window.storage && typeof window.storage.delete === 'function'){
    try{ await window.storage.delete(key); return; } catch(e){ /* ignore */ }
  }
  try{ if(window.localStorage){ window.localStorage.removeItem(key); return; } }
  catch(e){ /* ignore */ }
  if(key===USERS_KEY) _memUsers = null; else if(key===SESSION_KEY) _memSession = null;
}

/* SHA-256 hash via the browser's built-in crypto API (not a substitute
   for real server-side password hashing like bcrypt/argon2, but far
   better than storing plaintext). */
async function hashPassword(password){
  try{
    const enc = new TextEncoder().encode(password);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Extremely old/locked-down environments without SubtleCrypto: fall back
    // to a simple non-cryptographic hash so the flow still functions.
    let h = 0;
    for(let i=0;i<password.length;i++){ h = ((h<<5)-h) + password.charCodeAt(i); h |= 0; }
    return 'fallback_' + h;
  }
}
async function getUsers(){
  try{ const raw = await rawGet(USERS_KEY); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
async function saveUsers(users){
  await rawSet(USERS_KEY, JSON.stringify(users));
}
function normalizeEmail(email){ return (email||'').trim().toLowerCase(); }
function isValidEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

async function handleSignup(){
  const emailRaw = document.getElementById('signupEmail').value;
  const pw = document.getElementById('signupPassword').value;
  const pw2 = document.getElementById('signupPasswordConfirm').value;
  const errEl = document.getElementById('signupError');
  const email = normalizeEmail(emailRaw);

  function showErr(msg){ errEl.textContent = msg; errEl.classList.add('show'); }
  errEl.classList.remove('show');

  if(!isValidEmail(email)) return showErr('Enter a valid email address.');
  if(pw.length < 8) return showErr('Password must be at least 8 characters.');
  if(pw !== pw2) return showErr('Passwords do not match.');

  const users = await getUsers();
  if(users[email]) return showErr('An account with this email already exists. Try logging in instead.');

  const hashed = await hashPassword(pw);
  users[email] = { passwordHash: hashed, createdAt: Date.now() };
  await saveUsers(users);
  await rawSet(SESSION_KEY, email);
  CURRENT_USER = { email };
  await enterApp();
}

async function handleLogin(){
  const emailRaw = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const email = normalizeEmail(emailRaw);

  function showErr(msg){ errEl.textContent = msg; errEl.classList.add('show'); }
  errEl.classList.remove('show');

  if(!isValidEmail(email)) return showErr('Enter a valid email address.');
  if(!pw) return showErr('Enter your password.');

  const users = await getUsers();
  const account = users[email];
  if(!account) return showErr('No account found with this email. Try signing up.');

  const hashed = await hashPassword(pw);
  if(hashed !== account.passwordHash) return showErr('Incorrect password.');

  await rawSet(SESSION_KEY, email);
  CURRENT_USER = { email };
  await enterApp();
}

async function handleLogout(){
  await rawRemove(SESSION_KEY);
  CURRENT_USER = null;

  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';

}

async function tryResumeSession(){
  const email = await rawGet(SESSION_KEY);

    const users = await getUsers();

    }
  }

}

/* Per-user progress storage: each account's progress is stored under
   its own key so switching accounts on the same device/browser
   doesn't mix progress between users. */
function progressKeyForCurrentUser(){
  const id = CURRENT_USER ? CURRENT_USER.email : 'anonymous';
  return 'automatepath_progress__' + id;
}
async function loadProgress(){
  try{
    const value = await rawGet(progressKeyForCurrentUser());
    PROGRESS = value ? JSON.parse(value) : { completed:{}, quizScores:{}, currentLesson:null };
  }catch(e){
    console.error('loadProgress failed, starting fresh', e);
    PROGRESS = { completed:{}, quizScores:{}, currentLesson:null };
  }
}
async function saveProgress(){
  try{ await rawSet(progressKeyForCurrentUser(), JSON.stringify(PROGRESS)); }
  catch(e){ console.error('save failed', e); }
}
function markComplete(lessonId){

  PROGRESS.completed[lessonId] = true;
  saveProgress();
}
function isComplete(lessonId){ return !!PROGRESS.completed[lessonId]; }
function isUnlocked(lessonId){
  const idx = ALL_LESSONS.findIndex(l=>l.id===lessonId);
  if(idx<=0) return true;
  return isComplete(ALL_LESSONS[idx-1].id);
}
function overallPercent(){
  const done = ALL_LESSONS.filter(l=>isComplete(l.id)).length;
  return Math.round((done/ALL_LESSONS.length)*100);
}
function showToast(msg){
  const t = document.getElementById('toast');

}

    <div class="hero">
      <h1>Welcome back</h1>
      <p>You're ${pct}% through the path from manual tester to automation engineer. ${nextLesson ? `Pick up where you left off, or jump into any unlocked module below.` : `You've completed every lesson — check your certificate.`}</p>
    </div>
    <div class="track-grid">
  `;
  CURRICULUM.forEach((mod, i)=>{
    const total = mod.lessons.length;
    const done = mod.lessons.filter(l=>isComplete(l.id)).length;
    const unlocked = mod.lessons.some(l=>isUnlocked(l.id));
    html += `
      <div class="track-card" onclick="${unlocked?`openLesson('${mod.lessons[0].id}')`:'lockedToast()'}">
        <div class="track-card-head"><div class="track-num">${mod.icon}</div><h3>${mod.title}</h3></div>
        <p>${total} lesson${total>1?'s':''} — ${mod.lessons.map(l=>l.type==='quiz'?'quiz':l.type==='sandbox'?'hands-on':'lesson').filter((v,i,a)=>a.indexOf(v)===i).join(', ')}</p>
        <div class="track-meta"><span>${done}/${total} complete</span></div>
      </div>
    `;
  });
  html += `</div>`;
  if(nextLesson){
    html += `<div style="margin-top:28px;"><button class="nav-btn primary" onclick="openLesson('${nextLesson.id}')">Continue: ${nextLesson.title} →</button></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER: LESSON ROUTER
   ============================================================ */
function findLesson(id){ return ALL_LESSONS.find(l=>l.id===id); }
function findModuleOf(id){ return CURRICULUM.find(m=>m.lessons.some(l=>l.id===id)); }

function openLesson(id){
  if(!isUnlocked(id)){ lockedToast(); return; }
  currentView='lesson'; currentLessonId=id;
  const lesson = findLesson(id);
  const mod = findModuleOf(id);
  document.getElementById('crumb').textContent = mod.title;
  document.getElementById('topTitle').textContent = lesson.title;
  renderSidebar();
  if(lesson.type==='lesson') renderLessonContent(lesson, mod);
  else if(lesson.type==='quiz') renderQuiz(lesson, mod);
  else if(lesson.type==='sandbox') renderSandbox(lesson, mod);
  window.scrollTo(0,0);
}

function lessonNavButtons(lesson){
  const idx = ALL_LESSONS.findIndex(l=>l.id===lesson.id);
  const prev = ALL_LESSONS[idx-1];
  const next = ALL_LESSONS[idx+1];
  return `<div class="lesson-nav">
    <button class="nav-btn" ${prev?`onclick="openLesson('${prev.id}')"`:'disabled'}>← Previous</button>
    <button class="nav-btn primary" id="completeBtn" onclick="completeAndAdvance('${lesson.id}')">${isComplete(lesson.id)?'Completed ✓ — Next →':'Mark complete & continue →'}</button>
  </div>`;
}
function completeAndAdvance(id){
  const wasComplete = isComplete(id);
  markComplete(id);
  if(!wasComplete) showToast('Lesson complete');
  const idx = ALL_LESSONS.findIndex(l=>l.id===id);
  const next = ALL_LESSONS[idx+1];
  renderSidebar();
  if(next) openLesson(next.id); else goCert();
}

function renderLessonContent(lesson, mod){
  let html = `
    <div class="lesson-header">
      <div class="lesson-kicker">${mod.title}</div>
      <h1>${lesson.title}</h1>
      <div class="lesson-meta-row"><span>${lesson.minutes} min read</span></div>
    </div>
    <div class="lesson-body">${lesson.body}</div>
    ${lessonNavButtons(lesson)}
  `;
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER: QUIZ
   ============================================================ */
function renderQuiz(lesson, mod){
  let qState = { current:0, score:0, answered:[] };
  function renderQ(){
    const q = lesson.quiz[qState.current];
    const total = lesson.quiz.length;
    let optsHtml = q.opts.map((opt,i)=>`
      <div class="quiz-opt" id="opt-${i}" onclick="selectQuizOpt(${i})">
        <div class="opt-letter">${String.fromCharCode(65+i)}</div><div>${opt}</div>
      </div>`).join('');
    document.getElementById('content').innerHTML = `
      <div class="lesson-header">
        <div class="lesson-kicker">${mod.title} · Quiz</div>
        <h1>${lesson.title}</h1>
      </div>
      <div class="quiz-box">
        <div class="quiz-progress">Question ${qState.current+1} of ${total}</div>
        <div class="quiz-q">${q.q}</div>
        ${optsHtml}
        <div class="quiz-explain" id="quizExplain"></div>
        <div class="quiz-footer">
          <div class="quiz-score">Score: ${qState.score}/${qState.answered.length}</div>
          <button class="nav-btn primary" id="quizNextBtn" style="display:none" onclick="quizNext()">${qState.current===total-1?'Finish quiz':'Next question'} →</button>
        </div>
      </div>
    `;
    window._quizState = qState;
    window._quizLesson = lesson;
    window._quizMod = mod;
  }
  window.selectQuizOpt = function(i){
    const q = lesson.quiz[qState.current];
    if(qState.answered[qState.current] !== undefined) return;
    qState.answered[qState.current] = i;
    const correct = q.correct;
    document.querySelectorAll('.quiz-opt').forEach((el,idx)=>{
      if(idx===correct) el.classList.add('correct');
      else if(idx===i) el.classList.add('incorrect');
    });
    if(i===correct) qState.score++;
    document.getElementById('quizExplain').textContent = q.explain;
    document.getElementById('quizExplain').classList.add('show');
    document.getElementById('quizNextBtn').style.display='inline-block';
    document.querySelector('.quiz-score').textContent = `Score: ${qState.score}/${qState.answered.length}`;
  };
  window.quizNext = function(){
    if(qState.current < lesson.quiz.length-1){
      qState.current++;
      renderQ();
    } else {
      PROGRESS.quizScores[lesson.id] = `${qState.score}/${lesson.quiz.length}`;
      markComplete(lesson.id);
      showToast(`Quiz complete: ${qState.score}/${lesson.quiz.length}`);
      const idx = ALL_LESSONS.findIndex(l=>l.id===lesson.id);
      const next = ALL_LESSONS[idx+1];
      renderSidebar();
      if(next) openLesson(next.id); else goCert();
    }
  };
  renderQ();
}

/* ============================================================
   RENDER: SANDBOX
   ============================================================ */
function renderSandbox(lesson, mod){
  const scenario = SANDBOX_SCENARIOS[lesson.scenario];
  const starter = SANDBOX_STARTER[lesson.scenario];
  let html = `
    <div class="lesson-header">
      <div class="lesson-kicker">${mod.title} · Hands-on</div>
      <h1>${lesson.title}</h1>
      <div class="lesson-meta-row"><span>${lesson.minutes} min</span></div>
    </div>
    <p style="color:var(--text-dim); font-size:14px; margin-bottom:14px;">${lesson.instructions}</p>
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:6px;">
      ${lesson.tasks.map(t=>`<div class="ex-task"><div class="ex-check"></div><div>${t}</div></div>`).join('')}
    </div>
    <div class="sandbox-wrap">
      <div class="sandbox-grid">
        <div class="editor-pane">
          <div class="editor-pane-head">
            <span>test.spec.ts</span>
            <button class="run-btn" onclick="runSandbox()">▶ Run test</button>
          </div>
          <textarea id="codeInput" spellcheck="false">${starter}</textarea>
        </div>
        <div class="preview-pane">
          <div class="preview-pane-head"><span>Mock browser preview</span><span id="resetLink" style="cursor:pointer;color:var(--accent);" onclick="resetSandbox()">Reset</span></div>
          <div id="mockSite">${scenario.html}</div>
        </div>
      </div>
      <div id="consoleOut"><div class="console-line console-info">Console output will appear here when you run your test.</div></div>
    </div>
    ${lessonNavButtons(lesson)}
  `;
  document.getElementById('content').innerHTML = html;
  window._currentScenario = lesson.scenario;
  window._sandboxBaseHtml = scenario.html;
}
function resetSandbox(){
  document.getElementById('mockSite').innerHTML = window._sandboxBaseHtml;
  document.getElementById('consoleOut').innerHTML = '<div class="console-line console-info">Reset. Run your test again.</div>';
}
function runSandbox(){
  const code = document.getElementById('codeInput').value;
  resetSandbox();
  const consoleEl = document.getElementById('consoleOut');
  consoleEl.innerHTML='';
  let passCount=0, failCount=0;
  function log(msg, pass){
    const line = document.createElement('div');
    line.className = 'console-line ' + (pass===true ? 'console-pass' : pass===false ? 'console-fail' : 'console-info');
    line.textContent = (pass===true?'✓ ':pass===false?'✗ ':'  ') + msg;
    consoleEl.appendChild(line);
    if(pass===true) passCount++;
    if(pass===false) failCount++;
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }
  const scenario = SANDBOX_SCENARIOS[window._currentScenario];
  try{
    scenario.run(code, scenario.initState, log);
  }catch(e){
    log('Error running script: ' + e.message, false);
  }
  const summary = document.createElement('div');
  summary.className = 'console-line';
  summary.style.marginTop='6px';
  summary.style.color = failCount>0 ? 'var(--amber)' : 'var(--green)';
  summary.textContent = `Run complete — ${passCount} passed, ${failCount} failed`;
  consoleEl.appendChild(summary);
  if(failCount===0 && passCount>0) showToast('Nice — test run passed');
}

/* ============================================================
   RENDER: CERTIFICATE
   ============================================================ */
function goCert(){
  currentView='cert'; currentLessonId=null;
  document.getElementById('crumb').textContent='AutomatePath';
  document.getElementById('topTitle').textContent='Certificate';
  renderSidebar();
  const pct = overallPercent();
  let html='';
  if(pct===100){
    html = `
      <div class="cert-box">
        <h2>🎓 Course complete</h2>
        <p>You've completed the full path from manual to automation testing with Playwright — foundations, programming basics, locators, actions, assertions, framework design, and hands-on practice.</p>
        <button class="nav-btn primary" onclick="goDashboard()">Back to dashboard</button>
      </div>
    `;
  } else {
    const remaining = ALL_LESSONS.length - ALL_LESSONS.filter(l=>isComplete(l.id)).length;
    html = `
      <div class="cert-box">
        <h2>Almost there</h2>
        <p>You have ${remaining} lesson${remaining>1?'s':''} left before your certificate unlocks. Keep going — you're ${pct}% through.</p>
        <button class="nav-btn primary" onclick="goDashboard()">Continue learning</button>
      </div>
    `;
  }
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  try{
    const resumed = await tryResumeSession();
    if(resumed){
      await enterApp();
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      // allow Enter key to submit whichever form is active
      document.getElementById('loginPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') handleLogin(); });
      document.getElementById('signupPasswordConfirm').addEventListener('keydown', e=>{ if(e.key==='Enter') handleSignup(); });
    }
  }catch(e){
    console.error('AutomatePath failed to initialize:', e);
    document.body.innerHTML =
      '<div style="padding:40px;max-width:600px;margin:40px auto;font-family:sans-serif;color:#e8eaed;background:#13161b;border-radius:12px;">'+
      '<h2 style="margin-bottom:12px;">Something went wrong loading AutomatePath</h2>'+
      '<p style="color:#9aa3b2;margin-bottom:16px;">Error: '+ (e && e.message ? e.message : e) +'</p>'+
      '<p style="color:#9aa3b2;">Try refreshing the page. If you opened this file directly from disk, try a different browser, or open it via a local server instead of the file:// protocol.</p>'+
      '</div>';
  }
}
init();
</script>
